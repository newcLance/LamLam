<script>
document.addEventListener('alpine:init', function() {
  Alpine.store('lightbox', {
    open: false,
    src: '',
    imgs: [],
    idx: 0,
    show: function(imgSrc) {
      this.src = imgSrc;
      this.imgs = Array.from(document.querySelectorAll('[data-lightbox-src]')).map(function(el) {
        return el.getAttribute('data-lightbox-src');
      });
      this.idx = this.imgs.indexOf(imgSrc);
      if (this.idx < 0) this.idx = 0;
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    close: function() {
      this.open = false;
      document.body.style.overflow = '';
    },
    prev: function() {
      if (this.idx > 0) { this.idx--; this.src = this.imgs[this.idx]; }
    },
    next: function() {
      if (this.idx < this.imgs.length - 1) { this.idx++; this.src = this.imgs[this.idx]; }
    }
  });
});
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<script>
function compareApp(){
  return {
    prods: [],
    screenshots: {},
    active: 'screenshots',
    tabs: [
      {key:'screenshots', label:'官网截图', hasCommon:false},
      {key:'worldview',   label:'世界观',   hasCommon:false},
      {key:'story',       label:'故事剧情', hasCommon:false},
      {key:'summary',     label:'美学综述', hasCommon:false},
      {key:'aesthetic',   label:'五维美术', hasCommon:false},
      {key:'playerexp',   label:'玩家体验', hasCommon:false},
    ],
    tableHtml: {worldview:'', story:'', summary:'', aesthetic:'', playerexp:''},
    hasCommon: {worldview:false, story:false, aesthetic:false},

    init(){
      var ids = new URLSearchParams(location.search).get('ids');
      if(!ids) return;
      var idList = ids.split(',').map(Number).filter(Boolean);
      Promise.all([
        fetch('data/games-full.json').then(r=>r.json()),
        fetch('data/screenshots.json').then(r=>r.json())
      ]).then(([games, ss])=>{
        this.screenshots = ss;
        this.prods = idList.map(id=>games.find(g=>g.id===id)).filter(Boolean);
        this.buildAll();
        this.syncTabHasCommon();
        // 滚动监听：当前可视 section 在锚点导航高亮
        this.$nextTick(()=>this.bindScrollSpy());
      });
    },

    bindScrollSpy(){
      var keys = this.tabs.map(t=>t.key);
      var self = this;
      var onScroll = function(){
        var navH = 130; // 全局 header 56 + 锚点 nav ~50 + 缓冲 24
        var current = keys[0];
        for(var i = 0; i < keys.length; i++){
          var el = document.getElementById('sec-' + keys[i]);
          if(!el) continue;
          var rect = el.getBoundingClientRect();
          if(rect.top - navH < 50){
            current = keys[i];
          } else {
            break;
          }
        }
        if(self.active !== current) self.active = current;
      };
      window.addEventListener('scroll', onScroll, {passive:true});
      onScroll();
    },

    getImgs(p){
      var ss = this.screenshots[p.name]||[];
      var imgs=[];
      ss.forEach(m=>(m.screens||[]).forEach(s=>{if(s.imgs)imgs=imgs.concat(s.imgs);}));
      return imgs.slice(0,8);
    },

    buildAll(){
      this.tableHtml.worldview = this.buildWorldview();
      this.buildStory();
      this.tableHtml.summary = this.buildSummary();
      this.tableHtml.aesthetic = this.buildAesthetic();
      this.tableHtml.playerexp = this.buildPlayerExp();
    },

    syncTabHasCommon(){
      this.tabs.forEach(t=>{
        if(t.key === 'worldview') t.hasCommon = this.hasCommon.worldview;
        else if(t.key === 'story') t.hasCommon = this.hasCommon.story;
        else if(t.key === 'aesthetic') t.hasCommon = this.hasCommon.aesthetic;
      });
    },

    // ─ 工具函数 ─
    findCommonBolds(values){
      var sets = values.map(v=>((v||'').match(/<b>([^<]+)<\/b>/g)||[]).map(s=>s.replace(/<\/?b>/g,'')));
      var counts={};
      sets.forEach(ts=>{var u={};ts.forEach(t=>{u[t]=1;});Object.keys(u).forEach(t=>{counts[t]=(counts[t]||0)+1;});});
      return Object.keys(counts).filter(t=>counts[t]>=2);
    },

    headerRow(){
      var prods = this.prods;
      var t = '<thead class="sticky top-0 z-10"><tr><th class="p-3 bg-surface-3 text-xs font-bold text-neutral-500 uppercase tracking-wide border-b border-bdr w-28">维度</th>';
      prods.forEach(p=>{
        var nameDisplay = p.nameCN || p.name;
        var company = p.company || '';
        if(p.stub){
          // stub 游戏：不可跳转，加「还没建档」徽标
          t += '<th class="p-3 bg-surface-2 border-b border-bdr min-w-[220px] text-left">'
             +'<div class="flex items-center gap-1.5 flex-wrap">'
             +'<span class="text-sm font-semibold text-neutral-400">'+nameDisplay+'</span>'
             +'<span class="text-[10px] text-neutral-500 px-1.5 py-0.5 rounded bg-white/[.03] border border-white/[.06]">还没建档</span>'
             +'</div>'
             +'<span class="text-xs text-neutral-600 font-normal">'+company+'</span>'
             +'</th>';
        } else {
          // 正常游戏：游戏名做成跳转链接
          var slug = p.slug || '';
          var href = slug ? 'game/'+slug+'.html' : '#';
          t += '<th class="p-3 bg-surface-2 border-b border-bdr min-w-[220px] text-left">'
             +'<a href="'+href+'" class="group inline-flex items-center gap-1.5 text-sm font-semibold text-white hover:text-white transition no-underline">'
             +'<span class="group-hover:underline decoration-white/40 underline-offset-2">'+nameDisplay+'</span>'
             +'<svg class="w-3 h-3 text-neutral-500 group-hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>'
             +'</a>'
             +' <span class="text-xs text-neutral-600 font-normal">'+company+'</span>'
             +'</th>';
        }
      });
      t += '</tr></thead>';
      return t;
    },

    cell(val, isCommon){
      return '<td class="p-3 text-[13px] leading-7 text-neutral-400 border-b border-bdr align-top data-text'
        +(isCommon?' bg-white/[.06] border-l-[3px] border-l-white/40':'')+'">'
        +(val||'—')
        +(isCommon?'<span class="inline-flex items-center gap-1 text-[9px] px-2 py-0.5 rounded border border-white/20 bg-white/10 text-white font-bold ml-1.5 whitespace-nowrap">• 共同</span>':'')
        +'</td>';
    },

    // ─ 1. Worldview 对比 ─
    buildWorldview(){
      var prods=this.prods;
      var dims = [
        {key:'background', label:'世界背景'},
        {key:'mainStory',  label:'主线故事'},
        {key:'combat',     label:'战斗系统'},
        {key:'coreLoop',   label:'核心循环'},
      ];
      var t = '<table class="w-full border-collapse bg-surface-1 text-left">';
      t += this.headerRow();
      t += '<tbody>';
      var hasAnyCommon=false;
      dims.forEach(dim=>{
        var values = prods.map(p=>{
          var w = p.worldview||{};
          var v = w[dim.key];
          return v ? (v.value||'') : '';
        });
        var common = this.findCommonBolds(values);
        if(common.length) hasAnyCommon = true;
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">'+dim.label+'</td>';
        values.forEach(val=>{
          var isC = common.length && common.some(term=>val.includes(term));
          t += this.cell(val, isC);
        });
        t += '</tr>';
      });
      t += '</tbody></table>';
      this.hasCommon.worldview = hasAnyCommon;
      return t;
    },

    // ─ 2. Story 对比 ─
    buildStory(){
      var prods=this.prods;

      // dims table
      var allLabels=[];var seen={};
      prods.forEach(p=>{
        var dims = (p.story||{}).dims||[];
        dims.forEach(d=>{if(!seen[d.label]){seen[d.label]=1;allLabels.push(d.label);}});
      });

      // 检查是否有 overview
      var hasOverview = prods.some(p=>(p.story||{}).overview);

      if(!allLabels.length && !hasOverview){
        this.tableHtml.story='<div class="text-sm text-neutral-500 p-4">暂无 IP/故事维度数据</div>';
        return;
      }

      var t = '<table class="w-full border-collapse bg-surface-1 text-left">';
      t += this.headerRow();
      t += '<tbody>';
      var hasAnyCommon=false;

      // ─ overview tagline 一行 ─
      if(hasOverview){
        var taglines = prods.map(p=>(((p.story||{}).overview)||{}).tagline||'');
        var commonTL = this.findCommonBolds(taglines);
        if(commonTL.length) hasAnyCommon = true;
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-500 uppercase tracking-wide bg-white/[.02] border-b border-bdr align-top">开篇钩子</td>';
        taglines.forEach(val=>{
          var isC = commonTL.length && commonTL.some(term=>val.includes(term));
          var content = val ? '<div class="text-[14px] font-bold text-white leading-snug">'+val+'</div>' : '—';
          var cellHtml = '<td class="p-3 text-[13px] leading-7 text-neutral-400 border-b border-bdr align-top'
            +(isC?' bg-white/[.06] border-l-[3px] border-l-white/40':'')+'">'
            +content
            +(isC?'<span class="inline-flex items-center gap-1 text-[9px] px-2 py-0.5 rounded border border-white/20 bg-white/10 text-white font-bold ml-1.5 whitespace-nowrap">• 共同</span>':'')
            +'</td>';
          t += cellHtml;
        });
        t += '</tr>';

        // ─ overview paragraphs（合并为段落组）─
        var paraValues = prods.map(p=>{
          var ps = (((p.story||{}).overview)||{}).paragraphs||[];
          return ps.join('\n\n');
        });
        var commonPara = this.findCommonBolds(paraValues);
        if(commonPara.length) hasAnyCommon = true;
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-500 uppercase tracking-wide bg-white/[.02] border-b border-bdr align-top">开篇综述</td>';
        prods.forEach((p, i)=>{
          var ps = (((p.story||{}).overview)||{}).paragraphs||[];
          var val = paraValues[i];
          var isC = commonPara.length && commonPara.some(term=>val.includes(term));
          var html = ps.length ? ps.map(s=>'<p class="mb-2 last:mb-0">'+s+'</p>').join('') : '<span class="text-neutral-600">—</span>';
          t += '<td class="p-3 text-[12px] leading-6 text-neutral-400 border-b border-bdr align-top'
            +(isC?' bg-white/[.06] border-l-[3px] border-l-white/40':'')+'">'
            +html
            +(isC?'<span class="inline-flex items-center gap-1 text-[9px] px-2 py-0.5 rounded border border-white/20 bg-white/10 text-white font-bold ml-1.5 whitespace-nowrap">• 共同</span>':'')
            +'</td>';
        });
        t += '</tr>';
      }

      // ─ dims 维度表格（之前的逻辑）─
      allLabels.forEach(label=>{
        var values = prods.map(p=>{
          var dims = (p.story||{}).dims||[];
          var d = dims.find(x=>x.label===label);
          return d ? (d.value||'') : '';
        });
        var common = this.findCommonBolds(values);
        if(common.length) hasAnyCommon = true;
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-500 uppercase tracking-wide bg-white/[.02] border-b border-bdr align-top">'+label+'</td>';
        values.forEach(val=>{
          var isC = common.length && common.some(term=>val.includes(term));
          t += this.cell(val, isC);
        });
        t += '</tr>';
      });
      t += '</tbody></table>';
      this.hasCommon.story = hasAnyCommon;
      this.tableHtml.story = t;
    },

    // ─ 3. Aesthetic Summary 对比 ─
    buildSummary(){
      var prods=this.prods;
      var rows = [
        {key:'label',      label:'美学定调'},
        {key:'definition', label:'定义公式'},
        {key:'evolution',  label:'共识发展史'},
      ];
      var t = '<table class="w-full border-collapse bg-surface-1 text-left">';
      t += this.headerRow();
      t += '<tbody>';
      rows.forEach(r=>{
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">'+r.label+'</td>';
        prods.forEach(p=>{
          var s = (p.aesthetic||{}).summary || {};
          var val = s[r.key] || '';
          t += this.cell(val, false);
        });
        t += '</tr>';
      });
      // references 谱系
      t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">借鉴谱系</td>';
      prods.forEach(p=>{
        var refs = ((p.aesthetic||{}).summary||{}).references || [];
        var html = refs.map(r=>'<span class="inline-block px-2 py-0.5 rounded text-[11px] bg-white/[.04] border border-white/[.08] text-neutral-300 mr-1 mb-1">'+r.title+(r.year?' <span class="text-neutral-600">'+r.year+'</span>':'')+'</span>').join('');
        t += '<td class="p-3 text-[12px] leading-6 border-b border-bdr align-top">'+(html||'<span class="text-neutral-600">—</span>')+'</td>';
      });
      t += '</tr>';
      t += '</tbody></table>';
      return t;
    },

    // ─ 4. Aesthetic 5-card 对比 ─
    buildAesthetic(){
      var prods=this.prods;
      var dims=[
        {key:'scene',    label:'场景氛围'},
        {key:'costume',  label:'角色服装'},
        {key:'ui',       label:'UI 界面'},
        {key:'symbol',   label:'视觉符号'},
        {key:'promo',    label:'宣发风格'},
      ];

      var t = '<table class="w-full border-collapse bg-surface-1 text-left">';
      t += this.headerRow();
      t += '<tbody>';
      var hasAnyCommon=false;
      dims.forEach(dim=>{
        var values = prods.map(p=>{
          var ae = (p.aesthetic||{})[dim.key];
          return ae ? (ae.value||'') : '';
        });
        var common = this.findCommonBolds(values);
        if(common.length) hasAnyCommon=true;
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">'+dim.label+'</td>';
        prods.forEach((p, i)=>{
          var ae = (p.aesthetic||{})[dim.key];
          var val = values[i];
          var title = ae ? (ae.title||'') : '';
          var combined = title ? '<div class="text-xs text-neutral-500 font-semibold mb-1">'+title+'</div>'+val : val;
          var isC = common.length && common.some(term=>val.includes(term));
          t += this.cell(combined, isC);
        });
        t += '</tr>';
      });
      t += '</tbody></table>';
      this.hasCommon.aesthetic = hasAnyCommon;
      return t;
    },

    // ─ 5. PlayerExp 对比 ─
    buildPlayerExp(){
      var prods=this.prods;
      var rows = [
        {key:'media',     label:'媒体记忆点'},
        {key:'community', label:'社区记忆点'},
      ];
      var t = '<table class="w-full border-collapse bg-surface-1 text-left">';
      t += this.headerRow();
      t += '<tbody>';
      rows.forEach(r=>{
        t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">'+r.label+'</td>';
        prods.forEach(p=>{
          var pe = p.playerExp||{};
          var memArr = ((pe[r.key])||{}).memory || [];
          if(!memArr.length){
            t += '<td class="p-3 text-[12px] text-neutral-600 border-b border-bdr align-top">—</td>';
            return;
          }
          var html = '<ul class="space-y-2">';
          memArr.slice(0,5).forEach(m=>{
            var src = m.src ? '<span class="text-[10px] text-neutral-600 ml-1">— '+m.src+'</span>' : '';
            html += '<li class="text-[12px] leading-6 text-neutral-400">'+(m.text||'')+src+'</li>';
          });
          html += '</ul>';
          t += '<td class="p-3 border-b border-bdr align-top">'+html+'</td>';
        });
        t += '</tr>';
      });
      // biliVideos count
      t += '<tr><td class="p-3 text-[11px] font-bold text-neutral-400 bg-white/[.02] border-b border-bdr align-top">B 站热门视频</td>';
      prods.forEach(p=>{
        var vids = ((p.playerExp||{}).biliVideos)||[];
        if(!vids.length){
          t += '<td class="p-3 text-[12px] text-neutral-600 border-b border-bdr align-top">—</td>';
          return;
        }
        var html = '<ul class="space-y-1">';
        vids.slice(0,5).forEach(v=>{
          var bvid = v.bvid||'';
          var url = bvid ? 'https://www.bilibili.com/video/'+bvid : '#';
          html += '<li class="text-[11px] leading-5"><a href="'+url+'" target="_blank" rel="noopener" class="text-neutral-400 hover:text-white">'+(v.title||'')+'</a> <span class="text-neutral-600">· '+(v.views||'')+'</span></li>';
        });
        html += '</ul>';
        t += '<td class="p-3 border-b border-bdr align-top">'+html+'</td>';
      });
      t += '</tr>';
      t += '</tbody></table>';
      return t;
    },
  };
}
</script>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品横向对比 - Game Design Tracker</title>
<!-- Tailwind CSS CDN (Play mode) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: { 0:'#0c0c0c', 1:'#141414', 2:'#1c1c1c', 3:'#252525' },
        bdr: 'rgba(255,255,255,.08)',
        accent: '#ffffff',
      },
      borderRadius: {
        DEFAULT: '4px',
        sm: '2px',
        md: '6px',
        lg: '6px',
        xl: '8px',
        '2xl': '8px',
      }
    }
  }
}
</script>
<style type="text/tailwindcss">
@layer base {
  body { @apply bg-surface-0 text-neutral-300 antialiased; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  a { color: inherit; text-decoration: none; }
}
@layer components {
  .data-text b { @apply text-white font-semibold bg-white/[.06] px-0.5 rounded-sm; }
  a.src-link { @apply text-neutral-400 text-xs opacity-80 hover:opacity-100 hover:text-white hover:underline transition-all; }
}
</style>
<!-- Alpine.js CDN -->
<script>
document.addEventListener('alpine:init', function() {
  Alpine.store('lightbox', {
    open: false,
    src: '',
    imgs: [],
    idx: 0,
    show: function(imgSrc) {
      this.src = imgSrc;
      this.imgs = Array.from(document.querySelectorAll('[data-lightbox-src]')).map(function(el) {
        return el.getAttribute('data-lightbox-src');
      });
      this.idx = this.imgs.indexOf(imgSrc);
      if (this.idx < 0) this.idx = 0;
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    close: function() {
      this.open = false;
      document.body.style.overflow = '';
    },
    prev: function() {
      if (this.idx > 0) { this.idx--; this.src = this.imgs[this.idx]; }
    },
    next: function() {
      if (this.idx < this.imgs.length - 1) { this.idx++; this.src = this.imgs[this.idx]; }
    }
  });
});
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</head>
<body class="min-h-screen">


<header class="sticky top-0 z-50 bg-surface-0/95 backdrop-blur-xl border-b border-bdr">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-4">
    <a href="/index.html" class="font-extrabold text-sm text-white tracking-tight shrink-0">GAME TRACKER</a>
    
    <nav class="ml-auto flex gap-1 text-xs">
      
<a href="index.html" class="px-3 py-1.5 rounded-md hover:bg-surface-2 text-slate-400 hover:text-slate-200 transition text-xs">← 返回列表</a>

    </nav>
  </div>
</header>



<div class="max-w-7xl mx-auto px-4 py-6"
     x-data="compareApp()" x-init="init()">

  <h1 class="text-xl font-bold mb-1">竞品横向对比</h1>
  <div class="flex gap-1.5 flex-wrap mb-6" id="chips">
    <template x-for="p in prods" :key="p.id">
      <span class="px-3 py-1 rounded-full bg-surface-2 border border-bdr text-xs text-slate-400"
            x-text="p.icon + ' ' + (p.nameCN || p.name)"></span>
    </template>
  </div>

  
  <h2 class="text-base font-bold mb-3">官网截图对比</h2>
  <div class="grid gap-4 mb-8" :style="'grid-template-columns: repeat('+Math.min(prods.length,3)+',1fr)'">
    <template x-for="p in prods" :key="p.id">
      <div class="bg-surface-1 border border-bdr rounded-xl overflow-hidden">
        <div class="px-4 py-3 border-b border-bdr text-sm font-semibold flex items-center gap-2">
          <span x-text="p.icon"></span>
          <span x-text="p.nameCN || p.name"></span>
          <span class="ml-auto text-xs text-slate-500 font-normal" x-text="p.company"></span>
        </div>
        <div class="flex gap-1.5 p-3 overflow-x-auto">
          <template x-for="img in getImgs(p)" :key="img">
            <img :src="img" loading="lazy"
                 class="shrink-0 w-44 h-24 rounded-md object-cover border border-bdr cursor-pointer hover:border-white/20 transition"
                 x-on:click="$dispatch('open-lightbox', img)">
          </template>
          <div x-show="getImgs(p).length===0" class="shrink-0 w-44 h-24 rounded-md bg-surface-2 flex items-center justify-center text-xs text-slate-600">暂无截图</div>
        </div>
      </div>
    </template>
  </div>

  
  <h2 class="text-base font-bold mb-3">IP / 故事剧情对比</h2>
  <div class="overflow-x-auto mb-8">
    <div x-html="storyTableHtml"></div>
  </div>

  
  <h2 class="text-base font-bold mb-3">审美偏好对比 <span class="text-xs px-2.5 py-0.5 rounded-full bg-white/[.08] text-neutral-300 font-semibold ml-2">共同点已高亮</span></h2>
  <div class="overflow-x-auto mb-8">
    <div x-html="tableHtml"></div>
  </div>

  <div x-show="prods.length===0" class="text-center py-20 text-slate-500">
    未传入有效的游戏 ID，请从游戏详情页点击"一键对比"进入
  </div>
</div>



<div x-data
     x-on:keydown.escape.window="$store.lightbox.close()"
     x-on:keydown.left.window="if($store.lightbox.open) $store.lightbox.prev()"
     x-on:keydown.right.window="if($store.lightbox.open) $store.lightbox.next()"
     x-show="$store.lightbox.open" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[999] bg-black/95 flex flex-col items-center justify-center"
     x-on:click="$store.lightbox.close()">

  <!-- Top bar -->
  <div class="absolute top-0 inset-x-0 h-14 flex items-center justify-between px-5 z-20" x-on:click.stop>
    <div x-show="$store.lightbox.imgs.length > 1" class="px-3 py-1.5 rounded-lg bg-white/5 text-white/60 text-xs font-medium"
         x-text="($store.lightbox.idx+1) + ' / ' + $store.lightbox.imgs.length"></div>
    <div x-show="$store.lightbox.imgs.length <= 1"></div>
    <button class="w-9 h-9 rounded-xl bg-white/5 hover:bg-white/15 text-white/70 hover:text-white flex items-center justify-center transition"
            x-on:click="$store.lightbox.close()">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Prev btn -->
  <button x-show="$store.lightbox.idx > 0"
          class="absolute left-3 top-1/2 -translate-y-1/2 w-12 h-12 rounded-2xl bg-white/5 hover:bg-white/15 text-white/60 hover:text-white text-xl flex items-center justify-center transition z-20"
          x-on:click.stop="$store.lightbox.prev()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
  </button>

  <!-- Next btn -->
  <button x-show="$store.lightbox.idx < $store.lightbox.imgs.length - 1"
          class="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 rounded-2xl bg-white/5 hover:bg-white/15 text-white/60 hover:text-white text-xl flex items-center justify-center transition z-20"
          x-on:click.stop="$store.lightbox.next()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
  </button>

  <!-- Image -->
  <img x-bind:src="$store.lightbox.src" class="max-w-[94vw] max-h-[88vh] rounded-xl shadow-2xl cursor-default select-none" x-on:click.stop>

  <!-- Bottom hint -->
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/30 text-[11px] select-none" x-on:click.stop>
    按 ← → 切换 · ESC 关闭
  </div>
</div>


<button x-data="{show:false}"
        x-on:scroll.window="show = window.scrollY > 400"
        x-show="show" x-cloak
        x-on:click="window.scrollTo({top:0,behavior:'smooth'})"
        class="fixed bottom-6 right-6 w-10 h-10 rounded bg-white text-black flex items-center justify-center text-lg shadow-lg z-50 hover:bg-neutral-200 transition">
  ↑
</button>


<script>
function compareApp(){
  return {
    prods: [],
    screenshots: {},
    tableHtml: '',
    storyTableHtml: '',
    init(){
      var ids = new URLSearchParams(location.search).get('ids');
      if(!ids) return;
      var idList = ids.split(',').map(Number).filter(Boolean);
      Promise.all([
        fetch('data/games-full.json').then(r=>r.json()),
        fetch('data/screenshots.json').then(r=>r.json())
      ]).then(([games, ss])=>{
        this.screenshots = ss;
        this.prods = idList.map(id=>games.find(g=>g.id===id)).filter(Boolean);
        this.buildStoryTable();
        this.buildTable();
      });
    },
    getImgs(p){
      var ss = this.screenshots[p.name]||[];
      var imgs=[];
      ss.forEach(m=>(m.screens||[]).forEach(s=>{if(s.imgs)imgs=imgs.concat(s.imgs);}));
      return imgs.slice(0,8);
    },
    buildStoryTable(){
      var prods=this.prods;
      if(!prods.length) return;
      // Collect all story dim labels across products
      var allLabels=[];var seen={};
      prods.forEach(p=>{if(!p.story||!p.story.dims)return;p.story.dims.forEach(d=>{if(!seen[d.label]){seen[d.label]=1;allLabels.push(d.label);}});});
      if(!allLabels.length){this.storyTableHtml='<div class="text-sm text-slate-500">暂无 IP/故事数据</div>';return;}

      function findCommon(dim){
        var vals=[];
        prods.forEach(p=>{if(!p.story||!p.story.dims)return;var d=p.story.dims.find(x=>x.label===dim);if(d)vals.push(d.value);});
        if(vals.length<2)return[];
        var sets=vals.map(v=>(v.match(/<b>([^<]+)<\/b>/g)||[]).map(s=>s.replace(/<\/?b>/g,'')));
        var counts={};sets.forEach(ts=>{var u={};ts.forEach(t=>{u[t]=1;});Object.keys(u).forEach(t=>{counts[t]=(counts[t]||0)+1;});});
        return Object.keys(counts).filter(t=>counts[t]>=2);
      }

      var t='<table class="w-full border-collapse bg-surface-1 border border-bdr rounded-xl overflow-hidden text-left">';
      t+='<thead><tr><th class="p-3 bg-surface-3 text-xs font-bold text-slate-500 uppercase tracking-wide border-b border-bdr w-24">维度</th>';
      prods.forEach(p=>{t+='<th class="p-3 bg-surface-2 border-b border-bdr min-w-[200px]"><span class="text-sm">'+p.icon+' '+(p.nameCN||p.name)+'</span></th>';});
      t+='</tr></thead><tbody>';
      allLabels.forEach(dim=>{
        var common=findCommon(dim);
        t+='<tr><td class="p-3 text-[11px] font-bold text-neutral-500 uppercase tracking-wide bg-white/[.02] border-b border-bdr align-top">'+dim+'</td>';
        prods.forEach(p=>{
          var val='\u2014';
          if(p.story&&p.story.dims){var d=p.story.dims.find(x=>x.label===dim);if(d)val=d.value;}
          var isC=common.length&&common.some(term=>val.includes(term));
          t+='<td class="p-3 text-[13px] leading-7 text-slate-400 border-b border-bdr align-top data-text'+(isC?' bg-white/[.04] border-l-[3px] border-l-white/30':'')+'">'
            +val+(isC?'<span class="inline-block text-[9px] px-1.5 py-px rounded-full bg-white/10 text-white font-bold ml-1.5">\u5171\u540c</span>':'')+'</td>';
        });
        t+='</tr>';
      });
      t+='</tbody></table>';
      this.storyTableHtml=t;
    },
    buildTable(){
      var prods=this.prods;
      if(!prods.length) return;
      var dims=['scene','costume','ui','symbol','promo'];
      var dimLabels={scene:'\ud83c\udf04 \u573a\u666f\u6c1b\u56f4',costume:'\ud83d\udc58 \u89d2\u8272\u670d\u88c5',ui:'\ud83d\udcf1 UI\u754c\u9762',symbol:'\ud83d\udd23 \u89c6\u89c9\u7b26\u53f7',promo:'\ud83d\udce3 \u5ba3\u53d1\u98ce\u683c'};

      function findCommon(dim){
        var vals=[];
        prods.forEach(p=>{if(!p.aesthetic||!p.aesthetic[dim])return;vals.push(p.aesthetic[dim].value||'');});
        if(vals.length<2)return[];
        var sets=vals.map(v=>(v.match(/<b>([^<]+)<\/b>/g)||[]).map(s=>s.replace(/<\/?b>/g,'')));
        var counts={};sets.forEach(ts=>{var u={};ts.forEach(t=>{u[t]=1;});Object.keys(u).forEach(t=>{counts[t]=(counts[t]||0)+1;});});
        return Object.keys(counts).filter(t=>counts[t]>=2);
      }

      var t='<table class="w-full border-collapse bg-surface-1 border border-bdr rounded-xl overflow-hidden text-left">';
      t+='<thead><tr><th class="p-3 bg-surface-3 text-xs font-bold text-slate-500 uppercase tracking-wide border-b border-bdr w-28">\u7ef4\u5ea6</th>';
      prods.forEach(p=>{t+='<th class="p-3 bg-surface-2 border-b border-bdr min-w-[200px]"><span class="text-sm">'+p.icon+' '+(p.nameCN||p.name)+'</span></th>';});
      t+='</tr></thead><tbody>';

      dims.forEach(dim=>{
        var common=findCommon(dim);
        t+='<tr><td class="p-3 text-[11px] font-bold text-slate-400 bg-white/[.02] border-b border-bdr align-top">'+(dimLabels[dim]||dim)+'</td>';
        prods.forEach(p=>{
          var val='\u2014';var title='';
          if(p.aesthetic&&p.aesthetic[dim]){val=p.aesthetic[dim].value||'\u2014';title=p.aesthetic[dim].title||'';}
          if(title)val='<div class="text-xs text-slate-500 font-semibold mb-1">'+title+'</div>'+val;
          var isC=common.length&&common.some(term=>val.includes(term));
          t+='<td class="p-3 text-[13px] leading-7 text-slate-400 border-b border-bdr align-top data-text'+(isC?' bg-white/[.04] border-l-[3px] border-l-white/30':'')+'">'
            +val+(isC?'<span class="inline-block text-[9px] px-1.5 py-px rounded-full bg-white/10 text-white font-bold ml-1.5">\u5171\u540c</span>':'')+'</td>';
        });
        t+='</tr>';
      });
      t+='</tbody></table>';
      this.tableHtml=t;
    }
  };
}
</script>

</body>
</html>

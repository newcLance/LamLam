<script>
document.addEventListener('alpine:init', function() {
  Alpine.store('lightbox', {
    open: false,
    src: '',
    imgs: [],
    idx: 0,
    show: function(imgSrc) {
      this.src = imgSrc;
      this.imgs = Array.from(document.querySelectorAll('[data-lightbox-src]')).map(function(el) {
        return el.getAttribute('data-lightbox-src');
      });
      this.idx = this.imgs.indexOf(imgSrc);
      if (this.idx < 0) this.idx = 0;
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    close: function() {
      this.open = false;
      document.body.style.overflow = '';
    },
    prev: function() {
      if (this.idx > 0) { this.idx--; this.src = this.imgs[this.idx]; }
    },
    next: function() {
      if (this.idx < this.imgs.length - 1) { this.idx++; this.src = this.imgs[this.idx]; }
    }
  });
});
</script>

<script>
function anchorNav() {
  return {
    sections: [],
    active: '',
    init() {
      var defs = [
        {id:'sec-header',     label:'基本信息'},
        {id:'sec-screenshots', label:'官网截图'},
        {id:'sec-timeline',    label:'时间线'},
        {id:'sec-playerexp',   label:'体验清单'},
        {id:'sec-story',       label:'IP/故事'},
        {id:'sec-aesthetic',   label:'审美偏好'},
        {id:'sec-rivals',      label:'竞品推荐'}
      ];
      this.sections = defs.filter(function(d) {
        return document.getElementById(d.id);
      });
      if (this.sections.length) this.active = this.sections[0].id;
      this.onScroll();
    },
    onScroll() {
      var offset = 120;
      var current = this.active;
      for (var i = this.sections.length - 1; i >= 0; i--) {
        var el = document.getElementById(this.sections[i].id);
        if (el && el.getBoundingClientRect().top <= offset) {
          current = this.sections[i].id;
          break;
        }
      }
      this.active = current;
    },
    scrollTo(id) {
      var el = document.getElementById(id);
      if (el) {
        window.scrollTo({top: el.offsetTop - 60, behavior: 'smooth'});
      }
    }
  }
}
</script>

<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}游戏竞品设计追踪台{% endblock %}</title>
<!-- Tailwind CSS CDN (Play mode) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        surface: { 0:'#0a0a0f', 1:'#12121a', 2:'#1a1a25', 3:'#22222f' },
        bdr: 'rgba(85,85,106,.25)',
        accent: '#818cf8',
      }
    }
  }
}
</script>
<style type="text/tailwindcss">
@layer base {
  body { @apply bg-surface-0 text-slate-200 antialiased; }
  a { color: inherit; text-decoration: none; }
}
@layer components {
  /* Keyword highlight inside data text */
  .data-text b { @apply text-slate-100 font-semibold bg-indigo-500/10 px-0.5 rounded; }
  /* Source link */
  a.src-link { @apply text-accent text-xs opacity-80 hover:opacity-100 hover:underline transition-all; }
}
</style>
<!-- Alpine.js CDN -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% block head %}{% endblock %}
</head>
<body class="min-h-screen">

{# ===== HEADER ===== #}
<header class="sticky top-0 z-50 bg-surface-0/90 backdrop-blur-xl border-b border-bdr">
  <div class="max-w-7xl mx-auto px-4 h-12 flex items-center gap-4">
    <a href="{% block home_href %}/index.html{% endblock %}" class="font-extrabold text-sm text-accent shrink-0">G 游戏竞品分析</a>
    {% block header_center %}{% endblock %}
    <nav class="ml-auto flex gap-1 text-xs">
      {% block nav %}
      <a href="/index.html" class="px-3 py-1.5 rounded-md hover:bg-surface-2 text-slate-400 hover:text-slate-200 transition">产品浏览</a>
      {% endblock %}
    </nav>
  </div>
</header>

{# ===== CONTENT ===== #}
{% block content %}{% endblock %}

{# ===== LIGHTBOX ===== #}
<div x-data="{open:false, src:''}"
     x-on:open-lightbox.window="open=true; src=$event.detail"
     x-on:keydown.escape.window="open=false"
     x-show="open" x-cloak
     class="fixed inset-0 z-[999] bg-black/85 flex items-center justify-center cursor-zoom-out"
     x-on:click="open=false">
  <img :src="src" class="max-w-[95vw] max-h-[95vh] rounded-lg">
</div>

{# ===== BACK TO TOP ===== #}
<button x-data="{show:false}"
        x-on:scroll.window="show = window.scrollY > 400"
        x-show="show" x-cloak
        x-on:click="window.scrollTo({top:0,behavior:'smooth'})"
        class="fixed bottom-6 right-6 w-10 h-10 rounded-full bg-accent text-white flex items-center justify-center text-lg shadow-lg z-50 hover:bg-indigo-500 transition">
  ↑
</button>

{% block scripts %}{% endblock %}
</body>
</html>
